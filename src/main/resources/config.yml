# ============================================================================
#  SMP Essentials configuration
#  Every option is documented. After editing, run /smpe reload (or restart).
# ----------------------------------------------------------------------------
#  COMMANDS (alias: /smpessentials)
#    /smpe give <pickaxe|axe> [player]  Give an Amethyst tool   (smpessentials.give)
#    /smpe combat [player]              Show combat status      (smpessentials.combat.check)
#    /smpe preset [list|<name>]         List / apply a preset   (smpessentials.reload)
#    /smpe reload                       Reload this file        (smpessentials.reload)
#
#  PERMISSIONS
#    smpessentials.*               All permissions (default: op)
#    smpessentials.give            Use /smpe give (op)
#    smpessentials.reload          Use /smpe reload and /smpe preset (op)
#    smpessentials.combat.check    Use /smpe combat (everyone)
#    smpessentials.combat.bypass   Exempt from combat tagging/penalties (nobody)
# ----------------------------------------------------------------------------
#  PRESETS
#    'active-preset' selects a bundle of settings from the 'presets' section at
#    the bottom of this file and applies it ON TOP of everything below.
#      - custom  -> ignore presets, use the values written in this file as-is
#      - default -> balanced settings (same as the defaults below)
#      - hardcore-> harsher PvP and survival
#      - casual  -> relaxed: no combat penalties, tools never wear out
#    Switch live with /smpe preset <name> (temporary), or set it here + reload
#    to make it permanent.
# ============================================================================

active-preset: custom

amethyst-tools:
  # Master switch for the Amethyst pickaxe and axe abilities.
  enabled: true
  # Register the crafting recipes (1 amethyst shard + 2 netherite ingots + sticks,
  # in the vanilla diamond-tool layout). If false, tools are only obtainable via
  # /smpe give.
  recipes-enabled: true
  # Play the amethyst block chime when an Amethyst tool is used to mine and when
  # a player selects one on their hotbar.
  sound-effects: true

  pickaxe:
    # Apply durability damage to the tool for the extra blocks broken in the 3x3.
    # Unbreaking enchantments are respected.
    damage-tool: true

  axe:
    # Apply durability damage for each extra log felled. Unbreaking is respected.
    damage-tool: true
    # Safety cap on how many logs a single break may fell (prevents lag on huge
    # custom/jungle trees).
    max-logs: 256
    # Also break the tree's leaves when it is felled. Off by default (vanilla
    # leaves decay on their own).
    break-leaves: false

combat:
  # Master switch for the anti-combat-log system.
  enabled: true
  # How long (in seconds) a player stays "in combat" after being hit by another
  # player. The timer is ONLY started by player-vs-player damage (melee or a
  # player-fired projectile) and resets to this full value on every new hit.
  duration-seconds: 20
  # When a tagged player disconnects, drop their experience as orbs at the
  # logout location (in addition to their items).
  drop-experience: true
  # Block the commands below while a player is in combat.
  block-commands: true
  # Commands (without the leading slash) that cannot be used while in combat.
  # Matching is by the root command, so "tpa" also blocks "/tpa Steve".
  blocked-commands:
    - tp
    - tpa
    - tpaccept
    - tpahere
    - tpyes
    - teleport
    - home
    - sethome
    - homes
    - spawn
    - warp
    - warps
    - rtp
    - wild
    - randomtp
    - back
    - lobby
    - hub
    - server
  # Teleport causes that are cancelled while a player is in combat. This is a
  # catch-all that stops teleports from ANY plugin regardless of command name.
  # ENDER_PEARL and CHORUS_FRUIT are intentionally NOT listed, so those remain
  # usable in a fight. Valid values are org.bukkit PlayerTeleportEvent.TeleportCause
  # names, e.g. COMMAND, PLUGIN, SPECTATE, ENDER_PEARL, CHORUS_FRUIT, END_PORTAL.
  blocked-teleport-causes:
    - COMMAND
    - PLUGIN
    - SPECTATE
  # When a player who combat-logged reconnects, teleport them to the world spawn.
  teleport-to-spawn-on-rejoin: true
  # Show a combat countdown on the action bar.
  action-bar: true

messages:
  # &-style color codes are supported (translated to Adventure components).
  prefix: "&5&lSMP &8» &r"
  no-permission: "&cYou don't have permission to do that."
  reload-success: "&aConfiguration reloaded."
  tool-given: "&aGave a &5{tool}&a to &e{player}&a."
  tool-received: "&aYou received a &5{tool}&a!"
  combat-entered: "&cYou are now in combat! Do not log out for {seconds}s."
  combat-expired: "&aYou are no longer in combat."
  combat-action-bar: "&c⚔ In combat: &f{seconds}s"
  combat-command-blocked: "&cYou cannot use &e/{command}&c while in combat!"
  combat-teleport-blocked: "&cYou cannot teleport while in combat!"
  combat-log-broadcast: "&e{player} &ctried to combat log and was slain! Their loot was dropped."
  combat-log-rejoin: "&cYou logged out during combat and were slain. Your items were dropped where you left."
  combat-status-self: "&7You are in combat for &c{seconds}s&7."
  combat-status-self-none: "&7You are not in combat."
  combat-status-other: "&e{player} &7is in combat for &c{seconds}s&7."
  combat-status-other-none: "&e{player} &7is not in combat."

# ============================================================================
#  PRESETS
#  Each preset below lists only the settings it changes; anything it omits keeps
#  the value from the main config above. Selected via 'active-preset' at the top
#  of this file (or /smpe preset <name>). Feel free to add your own presets here.
# ============================================================================
presets:

  # Balanced defaults (identical to the values above).
  default:
    amethyst-tools:
      pickaxe:
        damage-tool: true
      axe:
        damage-tool: true
        break-leaves: false
    combat:
      enabled: true
      duration-seconds: 20
      teleport-to-spawn-on-rejoin: true

  # Harsher PvP and survival: longer combat window and trees take their leaves
  # with them.
  hardcore:
    amethyst-tools:
      axe:
        break-leaves: true
    combat:
      enabled: true
      duration-seconds: 30
      drop-experience: true
      teleport-to-spawn-on-rejoin: true

  # Relaxed: no combat-log penalties at all, and the Amethyst tools never lose
  # durability.
  casual:
    amethyst-tools:
      pickaxe:
        damage-tool: false
      axe:
        damage-tool: false
        break-leaves: true
    combat:
      enabled: false
