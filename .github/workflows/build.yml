name: Build

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build with Maven
        run: mvn -B -DskipTests clean package

      - name: Upload plugin jar (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: SMPEssentials
          path: target/SMPEssentials.jar
          if-no-files-found: error

      # Publish the jar to a rolling "latest" GitHub Release for a clean,
      # one-click download link (no login required to grab a release asset).
      - name: Publish jar to "latest" release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          body: Automatically built SMPEssentials.jar (Paper 26.1.2, Java 25).
          files: target/SMPEssentials.jar
